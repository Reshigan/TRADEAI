# TRADEAI Distributed Tracing Configuration
# Industry-leading observability with Jaeger

version: '3.8'

services:
  # Jaeger All-in-One (for development)
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: tradeai-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
      - JAEGER_DISABLED=false
    ports:
      - "5775:5775/udp"    # Agent - accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"    # Agent - accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"    # Agent - accept jaeger.thrift over binary thrift protocol
      - "5778:5778"        # Agent - serve configs
      - "16686:16686"      # UI
      - "14268:14268"      # Collector - accept jaeger.thrift directly from clients
      - "14250:14250"      # Collector - accept model.proto
      - "9411:9411"        # Collector - Zipkin compatible API
      - "4317:4317"        # Collector - OTLP gRPC
      - "4318:4318"        # Collector - OTLP HTTP
    networks:
      - tradeai-network
    volumes:
      - jaeger_data:/var/lib/jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jaeger Collector (for production)
  jaeger-collector:
    image: jaegertracing/jaeger-collector:1.50
    container_name: tradeai-jaeger-collector
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - ES_INDEX_PREFIX=jaeger
    ports:
      - "14268:14268"
      - "14250:14250"
      - "4317:4317"
      - "4318:4318"
    networks:
      - tradeai-network
    depends_on:
      - elasticsearch

  # Jaeger Query (for production)
  jaeger-query:
    image: jaegertracing/jaeger-query:1.50
    container_name: tradeai-jaeger-query
    restart: unless-stopped
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - ES_INDEX_PREFIX=jaeger
      - JAEGER_AGENT_HOST=jaeger-collector
    ports:
      - "16686:16686"
    networks:
      - tradeai-network
    depends_on:
      - elasticsearch
      - jaeger-collector

  # Jaeger Agent (sidecar for each service)
  jaeger-agent:
    image: jaegertracing/jaeger-agent:1.50
    container_name: tradeai-jaeger-agent
    restart: unless-stopped
    command: 
      - "--reporter.grpc.host-port=jaeger-collector:14250"
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
    networks:
      - tradeai-network
    depends_on:
      - jaeger-collector

  # Elasticsearch for Jaeger storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: tradeai-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=jaeger-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - tradeai-network
    ulimits:
      memlock:
        soft: -1
        hard: -1

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: tradeai-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - tradeai-network
    depends_on:
      - jaeger
      - prometheus

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: tradeai-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - tradeai-network

  # Backend with tracing enabled
  backend:
    environment:
      - JAEGER_SERVICE_NAME=tradeai-backend
      - JAEGER_AGENT_HOST=jaeger-agent
      - JAEGER_AGENT_PORT=6831
      - JAEGER_SAMPLER_TYPE=probabilistic
      - JAEGER_SAMPLER_PARAM=0.1
      - JAEGER_REPORTER_LOG_SPANS=true
      - JAEGER_TAGS=environment=production,version=2.1.3
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger-collector:4317
      - OTEL_RESOURCE_ATTRIBUTES=service.name=tradeai-backend,service.version=2.1.3
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    depends_on:
      - jaeger-agent
      - elasticsearch

  # Frontend with tracing enabled
  frontend:
    environment:
      - REACT_APP_JAEGER_ENDPOINT=http://jaeger:16686
      - REACT_APP_OTLP_ENDPOINT=http://jaeger-collector:4318
    depends_on:
      - jaeger

volumes:
  jaeger_data:
  elasticsearch_data:
  grafana_data:
  prometheus_data:

networks:
  tradeai-network:
    external: true
